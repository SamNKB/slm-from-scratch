# Smaller model for quick experiments (~1M params)
model:
  vocab_size: 4096
  context_length: 256
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 512
  dropout: 0.1
  bias: false

train:
  data_path: data/processed/train.bin
  val_data_path: data/processed/val.bin
  batch_size: 64
  max_steps: 5000
  eval_interval: 250
  eval_steps: 30
  log_interval: 25
  learning_rate: 5e-4
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 100
  checkpoint_dir: checkpoints
  checkpoint_interval: 500
  device: cuda
