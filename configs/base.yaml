model:
  vocab_size: 8192
  context_length: 512
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  dropout: 0.1
  bias: false

train:
  data_path: data/processed/train.bin
  val_data_path: data/processed/val.bin
  batch_size: 32
  max_steps: 10000
  eval_interval: 500
  eval_steps: 50
  log_interval: 50
  learning_rate: 3e-4
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 200
  checkpoint_dir: checkpoints
  checkpoint_interval: 1000
  device: cuda
